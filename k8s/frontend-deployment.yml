apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-frontend
  template:
    metadata:
      labels:
        app: flask-frontend
    spec:
      containers:
      - name: flask-frontend
        image: flask-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
        env:
        - name: BACKEND_URL
          value: "http://backend-service:5000/api/message"